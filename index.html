<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,minimum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>KHUMTONE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{
  --red:#8B2A2A;
  --red-light:#f9eded;
  --blk:#111;
  --bg:#f2f2f2;
  --card:#fff;
  --border:#e8e8e8;
  --sub:#888;
  --font:'IBM Plex Sans Thai',sans-serif;
  --mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:var(--font)}
html{font-size:16px;-webkit-text-size-adjust:100%;text-size-adjust:100%}
html,body{height:100%;overflow:hidden;background:var(--blk)}
body{display:flex;flex-direction:column;width:100%;min-height:100vh;position:relative}

/* STATUS BAR */
.sb{display:none;}
.sb-time{font-family:var(--mono);font-size:16px;color:rgba(255,255,255,.6);letter-spacing:.5px}
.sb-brand{font-size:11px;letter-spacing:3px;color:rgba(255,255,255,.25);text-transform:uppercase;font-weight:500}
.sb-bat{font-size:11px;color:rgba(255,255,255,.25)}

/* HEADER */
.hdr{background:linear-gradient(160deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%);padding:12px 18px 10px;flex-shrink:0}
.hdr-title{font-size:22px;font-weight:500;color:#fff;letter-spacing:.2px}
.hdr-sub{font-size:13px;color:rgba(255,255,255,.35);margin-top:4px}
.hdr-sub .red{color:var(--red)}
.pgb{background:rgba(255,255,255,.1);border-radius:2px;height:2px;margin-top:8px}
.pgf{height:100%;border-radius:2px;background:var(--red);transition:width .4s ease}

/* WEEK STRIP */
.wstrip{display:flex;gap:5px;padding:8px 14px 10px;background:linear-gradient(160deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%);flex-shrink:0;margin-bottom:-4px}
.dp{flex:1;text-align:center;padding:7px 2px;border-radius:10px;cursor:pointer;user-select:none;transition:all .15s}
.dp.sel{background:var(--red)}
.dp.today{background:rgba(139,42,42,.2);outline:1px solid rgba(139,42,42,.6)}
.dp .dl{font-size:11px;color:rgba(255,255,255,.35);display:block;letter-spacing:.3px}
.dp .dn{font-size:18px;font-weight:500;color:rgba(255,255,255,.7);display:block;margin-top:2px}
.dp.sel .dl,.dp.sel .dn{color:#fff}
.dp.today .dn{color:rgba(255,255,255,.9)}
.dp .dd{width:5px;height:5px;border-radius:50%;background:var(--red);margin:4px auto 0}
.dp.sel .dd{background:rgba(255,255,255,.6)}

/* CONTENT */
.cnt{flex:1;overflow-y:auto;padding:0 14px 10px;background:var(--bg);scrollbar-width:none}.cnt::-webkit-scrollbar{display:none}

.sec{font-size:12px;font-weight:600;color:var(--sub);letter-spacing:1px;text-transform:uppercase;padding:12px 0 6px}

/* TASK CARD */
.tc{background:var(--card);border-radius:14px;border:.5px solid var(--border);padding:15px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:all .15s;cursor:pointer}
.tc:active{transform:scale(.98)}
.tc.high-border{border-color:rgba(139,42,42,.3)}
.chk{width:26px;height:26px;border-radius:50%;border:2px solid #ccc;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.chk.h{border-color:var(--red)}
.chk.m{border-color:#777}
.chk.done{background:var(--red);border-color:var(--red);color:#fff;font-size:14px}
.tn{font-size:16px;color:var(--blk);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3}
.tn.done{text-decoration:line-through;color:#bbb}
.pb{font-size:11px;padding:3px 8px;border-radius:4px;display:inline-block;margin-top:4px;font-weight:500;letter-spacing:.3px}
.pb.h{background:var(--red);color:#fff}
.pb.m{background:#eee;color:#555}
.pb.l{background:#f5f5f5;color:#aaa;border:.5px solid #e8e8e8}
.xbtn{padding:7px 13px;border-radius:8px;border:.5px solid #ddd;background:transparent;font-size:13px;color:#777;flex-shrink:0;cursor:pointer;transition:all .15s}
.xbtn:hover{background:#f5f5f5}
.rbtn{padding:7px 13px;border-radius:8px;background:var(--red);border:none;font-size:13px;color:#fff;flex-shrink:0;cursor:pointer}

/* EVENT */
.ev{background:var(--card);border-radius:14px;border:.5px solid var(--border);border-left:3px solid var(--red);padding:12px 16px;margin-bottom:8px}
.ev-t{font-size:16px;color:var(--blk);font-weight:500}
.ev-s{font-size:13px;color:var(--sub);margin-top:4px}

/* ROUTINE */
.rt{background:var(--card);border-radius:14px;border:.5px solid var(--border);padding:15px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s}
.rt:active{transform:scale(.98)}
.rt.now-rt{border-color:var(--red)}
.rc{width:26px;height:26px;border-radius:50%;border:2px solid #ccc;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s}
.rc.done{background:var(--red);border-color:var(--red);color:#fff}
.rn{font-size:16px;color:var(--blk);flex:1}
.rtm{font-size:13px;color:var(--sub);white-space:nowrap}
.now-tag{font-size:11px;background:var(--red);color:#fff;padding:3px 8px;border-radius:5px;letter-spacing:.3px}

/* CALENDAR */
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:8px}
.ch{font-size:11px;text-align:center;color:#bbb;padding:4px 0;font-weight:500}
.cc{min-height:34px;background:var(--card);border-radius:6px;border:.5px solid #f0f0f0;padding:4px;cursor:pointer;transition:all .15s}
.cc:active{transform:scale(.95)}
.cc.td{border-color:var(--red)}
.cc.emp{background:transparent;border-color:transparent;cursor:default}
.cc.sel-day{background:var(--red-light);border-color:var(--red)}
.cdn{font-size:12px;color:#444;font-weight:500}
.cc.td .cdn{color:var(--red);font-weight:700}
.cc.sel-day .cdn{color:var(--red)}
.cdt{width:5px;height:5px;border-radius:50%;background:var(--red);margin-top:2px}
.cde{width:5px;height:5px;border-radius:50%;background:#999;margin-top:1px}
.cal-day-title{font-size:13px;font-weight:500;color:var(--blk);padding:6px 0 8px;border-top:.5px solid var(--border);margin-top:3px}

/* SUMMARY CARDS */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.sc{background:var(--card);border-radius:14px;border:.5px solid var(--border);padding:14px 16px}
.sc.r{background:var(--red);border-color:var(--red)}
.sc.k{background:var(--blk);border-color:var(--blk)}
.scl{font-size:13px;color:var(--sub)}
.sc.r .scl,.sc.k .scl{color:rgba(255,255,255,.4)}
.scn{font-size:30px;font-weight:500;color:var(--blk);margin-top:3px;font-family:var(--mono)}
.sc.r .scn,.sc.k .scn{color:#fff}

/* BARS */
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-l{font-size:13px;color:#555;width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-w{flex:1;background:#f0f0f0;border-radius:3px;height:8px;overflow:hidden}
.bar-f{height:100%;border-radius:3px;background:var(--red);transition:width .5s ease}
.bar-p{font-size:12px;color:var(--sub);width:36px;text-align:right;font-family:var(--mono)}

/* CHART */
.chart-wrap{background:var(--card);border-radius:14px;border:.5px solid var(--border);padding:16px;margin-bottom:9px}
.chart-title{font-size:15px;font-weight:500;color:var(--blk);margin-bottom:11px;display:flex;justify-content:space-between;align-items:center}
.chart-sub{font-size:12px;color:var(--sub);font-weight:400}

.week-bars{display:flex;align-items:flex-end;gap:3px;height:50px}
.wb-col{flex:1;display:flex;flex-direction:column;align-items:center}
.wb-bars{width:100%;display:flex;flex-direction:column;justify-content:flex-end;height:46px;gap:1px}
.wb-done{border-radius:2px 2px 0 0;background:var(--red)}
.wb-pend{background:#e8e8e8}
.wb-lbl{font-size:7px;color:var(--sub);margin-top:3px;text-align:center}
.wb-lbl.today-lbl{color:var(--red);font-weight:600}

.hb-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.hb-l{font-size:12px;color:#555;width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hb-w{flex:1;background:#f0f0f0;border-radius:4px;height:10px;overflow:hidden}
.hb-f{height:100%;border-radius:4px}
.hb-p{font-size:11px;color:var(--sub);width:32px;text-align:right;font-family:var(--mono)}

/* SCORE */
.score-big{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:12px;border:.5px solid var(--border);padding:14px;margin-bottom:7px}
.score-ring{width:56px;height:56px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.score-n{font-size:20px;font-weight:600;color:#fff;font-family:var(--mono)}
.s-title{font-size:14px;font-weight:500;color:var(--blk)}
.s-sub{font-size:12px;color:var(--sub);margin-top:3px}
.s-up{color:var(--red)}

/* INSIGHT */
.insight{display:flex;gap:9px;margin-bottom:6px;padding:10px 12px;background:var(--card);border-radius:10px;border:.5px solid var(--border)}
.ins-ic{font-size:16px;flex-shrink:0;margin-top:1px}
.ins-t{font-size:13px;color:#333;line-height:1.5;flex:1}
.ins-tag{font-size:10px;color:var(--red);background:var(--red-light);padding:2px 7px;border-radius:3px;display:inline-block;margin-top:4px;letter-spacing:.3px}
.ins-tag.g{color:#27500a;background:#eaf3de}
.ins-tag.b{color:#3c3489;background:#e8eaf6}

/* NO-DATE TASK */
.nd-card{background:var(--card);border-radius:12px;border:.5px solid var(--border);padding:12px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.add-btn{padding:7px 14px;border-radius:7px;background:var(--red);border:none;font-size:12px;color:#fff;flex-shrink:0;cursor:pointer}

/* POPUP */
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:flex-end;animation:fadeIn .15s}
.popup-sheet{background:var(--card);border-radius:18px 18px 0 0;padding:20px 16px;width:100%;animation:slideUp .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(20px)}to{transform:translateY(0)}}
.pop-title{font-size:15px;font-weight:500;color:var(--blk);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.pop-close{font-size:22px;color:#bbb;cursor:pointer;line-height:1}
.qbtns{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.qb{padding:8px 16px;border-radius:8px;font-size:13px;color:#555;background:#f5f5f5;border:.5px solid #e5e5e5;cursor:pointer;transition:all .15s}
.qb.active{background:var(--red);color:#fff;border-color:var(--red)}
.mcal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:6px}
.mc-h{font-size:11px;text-align:center;color:#bbb;padding:3px 0}
.mc-c{font-size:13px;text-align:center;padding:6px 2px;border-radius:6px;color:#555;cursor:pointer;transition:all .1s}
.mc-c:hover{background:#f5f5f5}
.mc-c.sel-c{background:var(--red);color:#fff}
.mc-c.today-c{font-weight:600;color:var(--red)}
.confirm-btn{width:100%;padding:15px;background:var(--red);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:500;margin-top:14px;cursor:pointer;letter-spacing:.3px}

/* BOTTOM NAV */
.bn{background:var(--blk);display:flex;padding:14px 0 22px;flex-shrink:0;border-top:.5px solid #333}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:all .15s}
.ni i{font-size:26px;color:rgba(255,255,255,.2);transition:color .15s}
.ni span{font-size:12px;color:rgba(255,255,255,.2);transition:color .15s;letter-spacing:.2px}
.ni.active i,.ni.active span{color:#fff}
.ni.active-red i,.ni.active-red span{color:var(--red)}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;z-index:200;letter-spacing:.2px}
.toast.show{opacity:1}
.empty{text-align:center;padding:50px 20px;color:#bbb;font-size:15px}

/* divider line */
.cal-legend{display:flex;gap:12px;font-size:11px;color:#888;margin-bottom:9px;padding-top:6px;border-top:.5px solid var(--border)}

/* NOW CARD */
.now-card{background:var(--blk);border-radius:16px;padding:16px;margin-bottom:8px;position:relative;overflow:hidden}
.now-card-time{font-family:var(--mono);font-size:32px;font-weight:500;color:#fff;letter-spacing:1px}
.now-card-label{font-size:12px;color:rgba(255,255,255,.35);margin-top:2px;letter-spacing:.5px;text-transform:uppercase}
.now-card-routine{display:flex;align-items:center;gap:8px;margin-top:12px;padding:10px 12px;background:rgba(255,255,255,.06);border-radius:10px}
.now-card-ri{font-size:18px}
.now-card-rn{font-size:14px;color:rgba(255,255,255,.85);flex:1}
.now-card-rt{font-size:12px;color:rgba(255,255,255,.35);font-family:var(--mono)}
.now-card-no{font-size:13px;color:rgba(255,255,255,.3);margin-top:10px}
.now-accent{position:absolute;right:-20px;top:-20px;width:100px;height:100px;border-radius:50%;background:rgba(139,42,42,.2)}

/* PROGRESS CARD */
.prog-card{background:var(--card);border-radius:16px;border:.5px solid var(--border);padding:14px 16px;margin-bottom:8px}
.prog-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.prog-title{font-size:14px;font-weight:500;color:var(--blk)}
.prog-pct{font-size:20px;font-weight:500;color:var(--red);font-family:var(--mono)}
.prog-bar-main{height:8px;background:#f0f0f0;border-radius:4px;overflow:hidden;margin-bottom:8px}
.prog-bar-fill{height:100%;border-radius:4px;background:var(--red);transition:width .5s ease}
.prog-stats{display:flex;gap:12px}
.prog-stat{font-size:12px;color:var(--sub)}
.prog-stat b{color:var(--blk);font-weight:500}

/* QUOTE CARD */
.quote-card{background:var(--red);border-radius:16px;padding:16px;margin-bottom:8px}
.quote-text{font-size:14px;color:rgba(255,255,255,.9);line-height:1.6;font-style:italic}
.quote-author{font-size:12px;color:rgba(255,255,255,.5);margin-top:8px;text-align:right}

/* MINI EVENT */
.mini-ev{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border-radius:12px;border:.5px solid var(--border);border-left:3px solid var(--red);margin-bottom:6px}
.mini-ev-time{font-size:12px;color:var(--red);font-family:var(--mono);white-space:nowrap;font-weight:500}
.mini-ev-name{font-size:14px;color:var(--blk);flex:1}
</style>
</head>
<body>

<!-- STATUS BAR -->
<div class="sb">
  <span class="sb-brand" style="font-size:11px;letter-spacing:3px;color:rgba(255,255,255,.25);font-weight:500">KHUMTONE</span>
  <span class="sb-bat" id="sb-bat" style="font-size:11px;color:rgba(255,255,255,.25)" id="sb-time"></span>
</div>

<!-- HEADER — ซ่อนเมื่อ Main tab ใช้ gradient card แทน -->
<div class="hdr" id="hdr" style="padding:0 18px 10px">
  <div class="hdr-title" id="hdr-title" style="font-size:22px"></div>
  <div class="hdr-sub" id="hdr-sub"></div>
  <div class="pgb"><div class="pgf" id="pgf" style="width:0%"></div></div>
</div>

<!-- WEEK STRIP — แสดงใน cnt แทน (renderAllContent จะ inject เข้าไป) -->
<div class="wstrip" id="wstrip" style="display:none"></div>

<!-- CONTENT -->
<div class="cnt" id="cnt"></div>

<!-- BOTTOM NAV -->
<nav class="bn">
  <div class="ni active" id="nav-all" onclick="switchTab('all')">
    <i class="ti ti-home"></i><span>Main</span>
  </div>
  <div class="ni" id="nav-cal" onclick="switchTab('cal')">
    <i class="ti ti-calendar"></i><span>Calendar</span>
  </div>
  <div class="ni" id="nav-tasks" onclick="switchTab('tasks')">
    <i class="ti ti-list"></i><span>Tasks</span>
  </div>
  <div class="ni" id="nav-routine" onclick="switchTab('routine')">
    <i class="ti ti-history"></i><span>History</span>
  </div>
  <div class="ni" id="nav-ai" onclick="switchTab('ai')">
    <i class="ti ti-chart-bar"></i><span>Summary</span>
  </div>
</nav>

<div class="toast" id="toast"></div>
<div id="popup"></div>

<script>
var WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzUocf5fXk59buzOHC7vOYPfuXJC2x5vxozg6AfC9VpA3mlFRxV53aJ_8jnrvFc4eHA/exec";
var LIFF_ID = "2010213644-d72CVt0y";

var TODAY = new Date();
var TODAY_STR = fmtDate(TODAY);
var currentTab = "all";
var selectedDate = TODAY_STR;

// Data stores
var todayTasks = [];
var todayEvents = [];
var routineItems = [];
var weekTasks = {};
var weekTaskEvents = {};
var noDateTasks = [];
var routineStats = { weekStats:{}, monthStats:{}, streak:0 };
var weekDays = [];
var popupTaskId = null;
var popupSelectedDate = TODAY_STR;

// ===================== UTILS =====================
function fmtDate(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}
function addDays(base, n) {
  var d = new Date(base + 'T00:00:00+07:00');
  d.setDate(d.getDate() + n);
  return fmtDate(d);
}
function fmtThai(ds) {
  var d = new Date(ds + 'T00:00:00+07:00');
  var days = ['อา','จ','อ','พ','พฤ','ศ','ส'];
  var months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return days[d.getDay()] + ' ' + d.getDate() + ' ' + months[d.getMonth()];
}
function fmtThaiLong(ds) {
  var d = new Date(ds + 'T00:00:00+07:00');
  var days = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัส','ศุกร์','เสาร์'];
  var months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return 'วัน' + days[d.getDay()] + ' ' + d.getDate() + ' ' + months[d.getMonth()];
}
function nowStr() {
  var n = new Date();
  return String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
}
function isNow(s, e) { var n = nowStr(); return n >= s && n <= e; }
function pc(c) { return c === 'High' ? 'h' : c === 'Medium' ? 'm' : 'l'; }
function getRoutineIcon(name) {
  var u = name.toUpperCase();
  return u.indexOf('EXERCISE')!==-1?'💪':u.indexOf('STUDY')!==-1?'📚':u.indexOf('ENGLISH')!==-1?'🇬🇧':u.indexOf('READ')!==-1?'📖':u.indexOf('REST')!==-1?'😴':'📌';
}
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}
function apiCall(params, cb) {
  var cbName = 'jsonp_' + Date.now() + '_' + Math.floor(Math.random()*10000);
  params.callback = cbName;
  var url = WEB_APP_URL + '?' + Object.keys(params).map(function(k){ return k+'='+encodeURIComponent(params[k]); }).join('&');
  var script = document.createElement('script');
  var timeout = setTimeout(function() {
    delete window[cbName];
    if (script.parentNode) script.parentNode.removeChild(script);
  }, 10000);
  window[cbName] = function(data) {
    clearTimeout(timeout);
    delete window[cbName];
    if (script.parentNode) script.parentNode.removeChild(script);
    cb(data);
  };
  script.src = url;
  document.head.appendChild(script);
}
function apiSilent(params) {
  var url = WEB_APP_URL + '?' + Object.keys(params).map(function(k){ return k+'='+encodeURIComponent(params[k]); }).join('&');
  var img = new Image(); img.src = url;
}

// ===================== WEEK STRIP =====================
function buildWeekDays() {
  var d = new Date(TODAY);
  var dow = d.getDay();
  var offset = dow === 0 ? -6 : 1 - dow;
  var mon = new Date(d); mon.setDate(d.getDate() + offset);
  var thShort = ['อา','จ','อ','พ','พฤ','ศ','ส'];
  weekDays = [];
  for (var i = 0; i < 7; i++) {
    var day = new Date(mon); day.setDate(mon.getDate() + i);
    weekDays.push({ date: fmtDate(day), day: thShort[day.getDay()], num: day.getDate() });
  }
}
function renderWeekStrip() {
  var h = '';
  weekDays.forEach(function(d) {
    var isT = d.date === TODAY_STR;
    var isSel = d.date === selectedDate;
    var cls = 'dp' + (isT?' today':'') + (isSel?' sel':'');
    var hasDot = (d.date === TODAY_STR && todayTasks.length > 0) ||
      (weekTasks[d.date] && weekTasks[d.date].length > 0);
    h += '<div class="'+cls+'" onclick="selectDay(\''+d.date+'\')" style="flex:1;text-align:center;padding:6px 2px;border-radius:10px;cursor:pointer">';
    h += '<span class="dl">'+d.day+'</span><span class="dn">'+d.num+'</span>';

  // fallback ใน wstrip เดิม
  var wsEl = document.getElementById('wstrip');
  if (wsEl) wsEl.innerHTML = h;
}
function selectDay(date) {

}

// ===================== TAB SWITCHER =====================
function switchTab(tab) {
  currentTab = tab;
  ['all','cal','routine','tasks','ai'].forEach(function(t) {
    var el = document.getElementById('nav-'+t);
    el.className = 'ni' + (t===tab ? (tab==='ai'?' active-red':' active') : '');
  });
  var ws = document.getElementById('wstrip');
  ws.style.display = (tab==='all') ? 'flex' : 'none';
  var hdr = document.getElementById('hdr');
  if (hdr) hdr.style.display = tab==='all' ? 'none' : 'block';
  if (tab==='all') renderAll();

}

// ===================== TAB ALL =====================
function renderAll() {
  renderWeekStrip();
  if (selectedDate === TODAY_STR) { renderAllContent(); return; }
  var tasksLoaded = weekTasks[selectedDate] !== undefined;
  var eventsLoaded = weekTaskEvents[selectedDate] !== undefined;
  if (tasksLoaded && eventsLoaded) { renderAllContent(); return; }
  document.getElementById('cnt').innerHTML = '<div class="empty">⏳ กำลังโหลด...</div>';
  var loaded = 0;
  function tryRender() { loaded++; if (loaded >= 2) renderAllContent(); }
  if (!tasksLoaded) {
    apiCall({ action:'getTasks', date:selectedDate }, function(data) {
      weekTasks[selectedDate] = data.tasks || []; tryRender();
    });
  } else { tryRender(); }
  if (!eventsLoaded) {
    apiCall({ action:'getCalendarEvents', date:selectedDate }, function(data) {
      weekTaskEvents[selectedDate] = data.events || []; tryRender();
    });
  } else { tryRender(); }
}

function confirmTask(id) {
  var task = todayTasks.find(function(t){ return t.id===id; });
  if (!task) Object.keys(weekTasks).forEach(function(d){ var f=weekTasks[d].find(function(t){ return t.id===id; }); if(f) task=f; });
  if (!task) return;
  task.done = true;
  renderAllContent();
  showToast('✅ ยืนยันแล้ว: '+task.name);
  apiSilent({ action:'updateTask', id:id, done:'true' });
}
function cancelTask(id) {
  var task = todayTasks.find(function(t){ return t.id===id; });
  if (!task) Object.keys(weekTasks).forEach(function(d){ var f=weekTasks[d].find(function(t){ return t.id===id; }); if(f) task=f; });
  if (!task) return;
  task.done = false;
  renderAllContent();
  showToast('↩️ ยกเลิกแล้ว: '+task.name);
  apiSilent({ action:'updateTask', id:id, done:'false' });
}
function toggleTask(id) {
  confirmTask(id);
}
function toggleRoutine(rid) {
  var r = routineItems.find(function(i){ return i.id===rid; });
  if (!r) return;
  r.done = !r.done;
  renderAllContent();
  showToast(r.done ? '✅ '+r.name : '↩️ '+r.name);
}

function renderMiniCal() {
  var now = new Date(TODAY_STR + 'T00:00:00+07:00');
  var h = '<div class="mcal"><div class="mc-h">จ</div><div class="mc-h">อ</div><div class="mc-h">พ</div><div class="mc-h">พฤ</div><div class="mc-h">ศ</div><div class="mc-h">ส</div><div class="mc-h">อา</div>';
  var first = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
  first = first === 0 ? 6 : first - 1;
  for (var i=0; i<first; i++) h += '<div></div>';
  var daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  for (var day=1; day<=daysInMonth; day++) {
    var ds = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    var cls = 'mc-c'+(ds===TODAY_STR?' today-c':'')+(ds===popupSelectedDate?' sel-c':'');

  }

  return h;
}
function selectMoveDate(date) {
  popupSelectedDate = date;

  var sheet = document.querySelector('.popup-sheet');
  if (sheet) { var mc = sheet.querySelector('.mcal'); if(mc) mc.outerHTML = renderMiniCal(); }
}
function quickMove(days) {
  popupSelectedDate = addDays(selectedDate, days);
  var inp = document.getElementById('move-date-input');
  if (inp) inp.value = popupSelectedDate;
  var sheet = document.querySelector('.popup-sheet');
  if (sheet) { var mc = sheet.querySelector('.mcal'); if(mc) mc.outerHTML = renderMiniCal(); }
}
function confirmMove() {
  if (!popupTaskId || !popupSelectedDate) return;
  apiSilent({ action:'moveTask', id:popupTaskId, date:popupSelectedDate });
  [todayTasks].concat(Object.values(weekTasks)).forEach(function(arr){
    var idx = arr.findIndex(function(t){ return t.id===popupTaskId; });
    if (idx !== -1) arr.splice(idx, 1);
  });
  showToast('📅 เลื่อนไป '+fmtThai(popupSelectedDate));
  closePopup(); renderAllContent();
}

function switchAddTab(tab) {

  document.getElementById('form-event').style.display = isTask ? 'none' : '';

function selectReminder(el, val) {

  });

}
function submitAddEvent() {
  var name = (document.getElementById('add-ev-name')||{}).value || '';
  var start = (document.getElementById('add-ev-start')||{}).value || '09:00';
  var end = (document.getElementById('add-ev-end')||{}).value || '10:00';
  var reminder = (document.getElementById('add-ev-reminder')||{}).value || '30';
  var date = (document.getElementById('add-ev-date')||{}).value || TODAY_STR;
  if (!name.trim()) { showToast('กรุณาใส่ชื่อนัดหมาย'); return; }
  showToast('⏳ กำลังบันทึกนัดหมาย...');
  closePopup();
  apiCall({ action:'addCalendarEvent', name:encodeURIComponent(name.trim()), date:date, startTime:start, endTime:end, reminder:reminder }, function(data) {
    if (data && data.ok) {
      showToast('📅 บันทึกนัดหมายแล้ว: '+name.trim());
    } else {
      showToast('✅ ส่งคำสั่งแล้ว (ตรวจสอบใน Calendar)');
    }
    delete calEventCache[date];
    weekTaskEvents[date] = undefined;
    apiCall({ action:'getCalendarEvents', date:date }, function(d2) {
      var evs = d2.events || [];
      if (date === TODAY_STR) todayEvents = evs;
      weekTaskEvents[date] = evs;
      if (currentTab==='all' && selectedDate===date) renderAllContent();
      if (currentTab==='cal') renderCal();
    });
  });
}
function selectAddPriority(el, pri) {
  document.querySelectorAll('[data-pri]').forEach(function(e){
    e.style.outline='none';
  });
  el.style.outline='2px solid '+( pri==='High'?'#A32D2D':pri==='Medium'?'#BA7517':'#3B6D11');
  document.getElementById('add-task-priority').value = pri;
}
function submitAddTask() {
  var name = (document.getElementById('add-task-name')||{}).value || '';
  var pri = (document.getElementById('add-task-priority')||{}).value || 'Medium';
  var date = (document.getElementById('add-task-date')||{}).value || TODAY_STR;
  if (!name.trim()) { showToast('กรุณาใส่ชื่องาน'); return; }
  showToast('⏳ กำลังเพิ่มงาน...');
  closePopup();
  // Call LINE Bot webhook via GAS
  apiCall({ action:'addTask', name:encodeURIComponent(name.trim()), date:date, priority:pri }, function(data) {
    showToast('✅ เพิ่มงานแล้ว: '+name.trim());
    // Reload tasks for that date
    delete calTaskCache[date]; delete weekTasks[date];
    if (date === TODAY_STR) {
      apiCall({ action:'getTasks', date:TODAY_STR }, function(d2) {
        todayTasks = d2.tasks || []; weekTasks[TODAY_STR] = todayTasks;
        calTaskCache[TODAY_STR] = todayTasks;
        if (currentTab==='all') renderAllContent();
        if (currentTab==='cal') renderCal();
      });
    } else {
      if (currentTab==='cal') renderCal();
    }
  });
}
function closePopup() { document.getElementById('popup').innerHTML = ''; }

// ===================== TAB CALENDAR =====================
var calTaskCache = {};
var calEventCache = {};
var calExpandedDate = null;
var calViewYear = new Date().getFullYear();
var calViewMonth = new Date().getMonth(); // 0-based

function calPrevMonth() {
  calViewMonth--;
  if (calViewMonth < 0) { calViewMonth = 11; calViewYear--; }
  calExpandedDate = null;
  renderCal();
}
function calNextMonth() {
  calViewMonth++;
  if (calViewMonth > 11) { calViewMonth = 0; calViewYear++; }
  calExpandedDate = null;
  renderCal();
}
function calGoToday() {
  var now = new Date();
  calViewYear = now.getFullYear();
  calViewMonth = now.getMonth();
  calExpandedDate = null;
  renderCal();
}

function renderCal() {
  var thMonthsFull = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  var yr = calViewYear, mo = calViewMonth + 1;
  var isCurrentMonth = (yr === new Date().getFullYear() && calViewMonth === new Date().getMonth());

  // Header
  document.getElementById('hdr-title').textContent = thMonthsFull[calViewMonth] + ' ' + (yr+543);
  document.getElementById('pgf').style.width = '0%';

  // Month nav bar (replace hdr-sub)
  var subEl = document.getElementById('hdr-sub');
  subEl.innerHTML =
    '<div style="display:flex;align-items:center;gap:8px">' +
    '<button onclick="calPrevMonth()" style="background:rgba(255,255,255,.1);border:none;color:#fff;border-radius:7px;padding:3px 10px;font-size:16px;cursor:pointer;line-height:1">‹</button>' +
    '<span style="flex:1;text-align:center;font-size:13px;color:rgba(255,255,255,.5)">' +
      (isCurrentMonth ? 'เดือนนี้' : thMonthsFull[calViewMonth]+' '+(yr+543)) +
    '</span>' +
    (isCurrentMonth ? '' : '<button onclick="calGoToday()" style="background:rgba(139,42,42,.5);border:none;color:#fff;border-radius:7px;padding:3px 10px;font-size:11px;cursor:pointer">วันนี้</button>') +
    '<button onclick="calNextMonth()" style="background:rgba(255,255,255,.1);border:none;color:#fff;border-radius:7px;padding:3px 10px;font-size:16px;cursor:pointer;line-height:1">›</button>' +
    '</div>';

  calTaskCache[TODAY_STR] = todayTasks;
  calEventCache[TODAY_STR] = todayEvents;
  var daysInMonth = new Date(yr, mo, 0).getDate();
  var first = new Date(yr, mo-1, 1).getDay();
  first = first === 0 ? 6 : first - 1;
  var cells = [];
  for (var i=0; i<first; i++) cells.push(null);
  for (var d=1; d<=daysInMonth; d++) cells.push(yr+'-'+String(mo).padStart(2,'0')+'-'+String(d).padStart(2,'0'));
  while (cells.length % 7 !== 0) cells.push(null);

  var h = '<table style="width:100%;border-collapse:collapse;table-layout:fixed"><thead><tr>';
  ['จ','อ','พ','พฤ','ศ','ส','อา'].forEach(function(d){ h += '<th style="font-size:12px;color:var(--blk);padding:7px 4px;text-align:center;border-bottom:.5px solid var(--border);font-weight:600">'+d+'</th>'; });
  h += '</tr></thead><tbody>';
  for (var r=0; r<cells.length; r+=7) {
    h += '<tr>';
    for (var c=0; c<7; c++) {
      var ds = cells[r+c];
      if (!ds) { h += '<td style="border:.5px solid var(--border);height:72px;background:var(--card);opacity:.25"></td>'; continue; }
      var isT = ds===TODAY_STR, isSel = ds===calExpandedDate;
      var dayNum = parseInt(ds.split('-')[2]);
      var selStyle = isSel ? 'box-shadow:inset 0 0 0 2px var(--red);' : '';
      var bgStyle = isT ? 'background:#FFF5F5;' : 'background:var(--card);';
      h += '<td id="cell-'+ds+'" onclick="toggleCalDay(\''+ds+'\')" style="border:.5px solid var(--border);height:72px;vertical-align:top;padding:4px 3px;'+bgStyle+selStyle+'cursor:pointer">';
      if (isT) {
        h += '<div style="font-size:11px;font-weight:600;color:#fff;background:var(--red);border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;margin-bottom:2px">'+dayNum+'</div>';
      } else {
        h += '<div style="font-size:11px;color:var(--sub);margin-bottom:2px;font-weight:'+(isSel?'600':'400')+'">'+dayNum+'</div>';
      }
      h += '<div id="items-'+ds+'">'+renderCellItems(ds)+'</div>';
      h += '</td>';
    }
    h += '</tr>';
    var rowDates = cells.slice(r, r+7).filter(Boolean);
    if (calExpandedDate && rowDates.indexOf(calExpandedDate) !== -1) {
      h += '<tr><td colspan="7" style="border:.5px solid var(--border);background:var(--bg);padding:0">';
      h += '<div id="cal-expand-panel" style="padding:12px 14px">'+renderExpandPanel(calExpandedDate)+'</div>';
      h += '</td></tr>';
    }
  }
  h += '</tbody></table>';
  document.getElementById('cnt').innerHTML = h;

  for (var d=1; d<=daysInMonth; d++) {
    (function(ds) {
      if (calTaskCache[ds] !== undefined && calEventCache[ds] !== undefined) return;
      if (!calTaskCache[ds]) apiCall({ action:'getTasks', date:ds }, function(data) {
        calTaskCache[ds] = data.tasks || []; weekTasks[ds] = calTaskCache[ds];
        var el = document.getElementById('items-'+ds); if (el) el.innerHTML = renderCellItems(ds);
      });
      if (!calEventCache[ds]) apiCall({ action:'getCalendarEvents', date:ds }, function(data) {
        calEventCache[ds] = data.events || [];
        var el = document.getElementById('items-'+ds); if (el) el.innerHTML = renderCellItems(ds);
      });
    })(yr+'-'+String(mo).padStart(2,'0')+'-'+String(d).padStart(2,'0'));
  }
}

function renderCellItems(ds) {
  var tasks = calTaskCache[ds] || [], events = calEventCache[ds] || [], h = '';
  events.slice(0,2).forEach(function(ev){
    h += '<div style="font-size:9px;padding:1px 3px;border-radius:2px;background:#E6F1FB;color:#0C447C;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">'+ev.start+' '+ev.title+'</div>';
  });
  var pending = tasks.filter(function(t){ return !t.done; });
  var doneT = tasks.filter(function(t){ return t.done; });
  pending.slice(0,2).forEach(function(t){
    var bg = t.priority==='High'?'#FCEBEB':t.priority==='Medium'?'#FAEEDA':'#EAF3DE';
    var col = t.priority==='High'?'#791F1F':t.priority==='Medium'?'#633806':'#27500A';
    h += '<div style="font-size:9px;padding:1px 3px;border-radius:2px;background:'+bg+';color:'+col+';margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">'+t.name+'</div>';
  });
  doneT.slice(0,1).forEach(function(t){
    h += '<div style="font-size:9px;padding:1px 3px;border-radius:2px;background:#f0f0f0;color:#aaa;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;text-decoration:line-through">✓ '+t.name+'</div>';
  });
  var more = Math.max(0,events.length-2) + Math.max(0,pending.length-2) + Math.max(0,doneT.length-1);
  if (more > 0) h += '<div style="font-size:9px;color:var(--sub)">+'+more+'</div>';
  return h;
}

function toggleCalDay(date) {
  calExpandedDate = (calExpandedDate === date) ? null : date;
  selectedDate = date;
  if (calExpandedDate && (!calTaskCache[date] || !calEventCache[date])) {
    var tLoaded = !!calTaskCache[date], eLoaded = !!calEventCache[date];
    function tryPanel() {
      if (!calTaskCache[date] || !calEventCache[date]) return;
      var p = document.getElementById('cal-expand-panel'); if (p) p.innerHTML = renderExpandPanel(date);
      var el = document.getElementById('items-'+date); if (el) el.innerHTML = renderCellItems(date);
    }
    if (!tLoaded) apiCall({ action:'getTasks', date:date }, function(data){ calTaskCache[date]=data.tasks||[];weekTasks[date]=calTaskCache[date];tryPanel(); });
    if (!eLoaded) apiCall({ action:'getCalendarEvents', date:date }, function(data){ calEventCache[date]=data.events||[];tryPanel(); });
  }
  renderCal();
}

function renderExpandPanel(date) {
  var tasks = calTaskCache[date]||[], events = calEventCache[date]||[];
  var thDays = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัส','ศุกร์','เสาร์'];
  var thM = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  var d = new Date(date+'T00:00:00+07:00');
  var h = '<div style="font-size:13px;font-weight:600;color:var(--blk);margin-bottom:10px">วัน'+thDays[d.getDay()]+' '+d.getDate()+' '+thM[d.getMonth()]+'</div>';
  if (events.length > 0) {
    h += '<div style="font-size:10px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px">นัดหมาย</div>';
    events.forEach(function(ev){
      h += '<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:#E6F1FB;border-radius:8px;margin-bottom:5px;border-left:3px solid #185FA5">';
      h += '<div style="flex:1"><div style="font-size:13px;color:#0C447C;font-weight:500">'+ev.title+'</div>';
      h += '<div style="font-size:11px;color:#378ADD;margin-top:2px">🕐 '+ev.start+' – '+ev.end+'</div></div></div>';
    });
  }
  var pending = tasks.filter(function(t){ return !t.done; });
  var doneArr = tasks.filter(function(t){ return t.done; });
  if (pending.length > 0) {
    h += '<div style="font-size:10px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin:8px 0 5px">งาน ('+pending.length+')</div>';
    pending.forEach(function(t){
      var bL = t.priority==='High'?'#A32D2D':t.priority==='Medium'?'#BA7517':'#3B6D11';
      var pBg = t.priority==='High'?'#FCEBEB':t.priority==='Medium'?'#FAEEDA':'#EAF3DE';
      var pCol = t.priority==='High'?'#791F1F':t.priority==='Medium'?'#633806':'#27500A';
      h += '<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border-radius:10px;margin-bottom:5px;border-left:3px solid '+bL+'">';
      h += '<div style="flex:1;min-width:0"><div style="font-size:13px;color:var(--blk);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+t.name+'</div>';
      h += '<span style="font-size:10px;padding:1px 7px;border-radius:3px;background:'+pBg+';color:'+pCol+';margin-top:3px;display:inline-block">'+t.priority+'</span></div>';
      h += '<div style="display:flex;gap:5px;flex-shrink:0">';
      h += '<button onclick="confirmTask(\''+t.id+'\');renderCal()" style="padding:5px 12px;font-size:11px;font-weight:500;background:var(--red);color:#fff;border:none;border-radius:6px;cursor:pointer">Done</button>';
      h += '<button onclick="openMovePopup(\\\''+t.id+'\\\',\\\''+t.name.replace(/\'/g,'')+'\\\');event.stopPropagation()" style="padding:5px 8px;font-size:11px;background:var(--bg);color:var(--sub);border:.5px solid var(--border);border-radius:6px;cursor:pointer">Move</button>';
      h += '</div></div>';
    });
  }
  if (doneArr.length > 0) {
    h += '<div style="font-size:10px;font-weight:600;color:#3B6D11;text-transform:uppercase;letter-spacing:.5px;margin:8px 0 5px">เสร็จแล้ว ('+doneArr.length+')</div>';
    doneArr.forEach(function(t){
      h += '<div style="padding:8px 12px;background:var(--card);border-radius:8px;margin-bottom:4px;opacity:.6;display:flex;align-items:center;gap:8px">';
      h += '<i class=\"ti ti-circle-check\" style=\"font-size:14px;color:#3B6D11;flex-shrink:0\"></i>';
      h += '<div style="font-size:13px;color:var(--sub);text-decoration:line-through;flex:1">'+t.name+'</div>';
      h += '<button onclick="cancelTask(\''+t.id+'\');renderCal()" style="padding:3px 8px;font-size:10px;background:var(--bg);color:var(--sub);border:.5px solid var(--border);border-radius:5px;cursor:pointer">Undo</button>';
      h += '</div>';
    });
  }
  if (!tasks.length && !events.length) h += '<div style="font-size:13px;color:var(--sub);text-align:center;padding:12px 0">ไม่มีงานและนัดหมาย</div>';
  h += '<div style="display:flex;gap:8px;margin-top:10px">';
  h += '<button onclick="openAddTaskPopup(\''+date+'\')" style="flex:1;padding:10px;background:var(--red);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer">+ Task</button>';
  h += '<button onclick="openAddEventPopupCal(\''+date+'\')" style="flex:1;padding:10px;background:#185FA5;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer">+ นัดหมาย</button>';
  h += '</div>';
  return h;
}

// ===================== SWIPE TO DELETE =====================
function initSwipeDelete() {
  var cards = document.querySelectorAll('[data-swipe-id]');
  cards.forEach(function(card) {
    var startX = 0, currentX = 0, isDragging = false;
    var id = card.getAttribute('data-swipe-id');
    var name = card.getAttribute('data-swipe-name');

    card.addEventListener('touchstart', function(e) {
      startX = e.touches[0].clientX;
      isDragging = true;
    }, { passive: true });

    card.addEventListener('touchmove', function(e) {
      if (!isDragging) return;
      currentX = e.touches[0].clientX - startX;
      if (currentX > 0) currentX = 0;
      if (currentX < -72) currentX = -72;
      card.style.transform = 'translateX('+currentX+'px)';
    }, { passive: true });

    card.addEventListener('touchend', function() {
      isDragging = false;
      if (currentX < -40) {
        card.style.transform = 'translateX(-72px)';
        confirmDeleteTask(id, name);
      } else {
        card.style.transform = 'translateX(0)';
      }
      currentX = 0;
    });
  });
}

  h += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">';
  h += '<div style="background:var(--bg);border-radius:8px;padding:8px;text-align:center"><div style="font-size:18px;font-weight:500;color:var(--red)">'+done+'</div><div style="font-size:10px;color:var(--sub);margin-top:1px">วันนี้</div></div>';
  h += '<div style="background:var(--bg);border-radius:8px;padding:8px;text-align:center"><div style="font-size:18px;font-weight:500;color:var(--red)" id="ai-week-done">--</div><div style="font-size:10px;color:var(--sub);margin-top:1px">สัปดาห์นี้</div></div>';
  h += '<div style="background:var(--bg);border-radius:8px;padding:8px;text-align:center"><div style="font-size:18px;font-weight:500;color:var(--red)">'+pending+'</div><div style="font-size:10px;color:var(--sub);margin-top:1px">ค้างวันนี้</div></div>';
  h += '</div></div>';

  // 2. Line + bar trend
  h += '<div style="background:var(--card);border:.5px solid var(--border);border-radius:14px;padding:14px;margin-bottom:8px">';
  h += '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px">';
  h += '<div style="font-size:12px;font-weight:500;color:var(--blk)">Productivity รายวัน</div>';
  h += '<div style="font-size:10px;color:var(--sub)">7 วัน</div></div>';
  h += '<div style="font-size:11px;color:var(--sub);margin-bottom:10px" id="trend-label">⏳ โหลด...</div>';
  h += '<div style="position:relative;height:70px;margin-bottom:5px" id="trend-wrap">';
  h += '<svg id="trend-svg" style="position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible" viewBox="0 0 300 70" preserveAspectRatio="none"></svg>';
  h += '<div id="trend-bars" style="display:flex;align-items:flex-end;gap:3px;height:70px;position:relative;z-index:1"></div>';
  h += '</div>';
  h += '<div style="display:flex;justify-content:space-around;font-size:9px;color:var(--sub)" id="trend-labels"></div>';
  h += '</div>';

  // 3. Delta รายวัน
  h += '<div style="background:var(--card);border:.5px solid var(--border);border-radius:14px;padding:14px;margin-bottom:8px">';
  h += '<div style="font-size:12px;font-weight:500;color:var(--blk);margin-bottom:10px">เพิ่ม/ลด เทียบวันก่อน</div>';
  h += '<div id="delta-rows" style="display:flex;flex-direction:column;gap:7px"><div style="font-size:11px;color:var(--sub)">⏳ โหลด...</div></div>';
  h += '</div>';

  // 4. Heatmap
  h += '<div style="background:var(--card);border:.5px solid var(--border);border-radius:14px;padding:14px;margin-bottom:8px">';
  h += '<div style="font-size:12px;font-weight:500;color:var(--blk);margin-bottom:2px">Productivity Heatmap</div>';
  h += '<div style="font-size:11px;color:var(--sub);margin-bottom:10px">30 วัน · สีเข้ม = งานเยอะ</div>';
  h += '<div id="heatmap-grid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:8px"></div>';
  h += '<div style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--sub)">';
  h += '<span>น้อย</span>';
  ['#f0f0f0','#f5e6e6','#c97575','#a84040','#8B2A2A'].forEach(function(c){
    h += '<div style="width:10px;height:10px;border-radius:1px;background:'+c+'"></div>';
  });
  h += '<span>เยอะ</span></div></div>';

  // 5. Comparison bands
  h += '<div style="background:var(--card);border:.5px solid var(--border);border-radius:14px;padding:14px;margin-bottom:8px">';
  h += '<div style="font-size:12px;font-weight:500;color:var(--blk);margin-bottom:10px">เทียบสัปดาห์นี้ vs ที่แล้ว</div>';
  h += '<div id="comp-rows" style="display:flex;flex-direction:column;gap:8px"><div style="font-size:11px;color:var(--sub)">⏳ โหลด...</div></div>';
  h += '<div style="display:flex;gap:12px;margin-top:10px;font-size:10px;color:var(--sub)">';
  h += '<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:3px;background:var(--red);display:inline-block;border-radius:1px"></span>สัปดาห์นี้</span>';
  h += '<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:3px;background:#ddd;display:inline-block;border-radius:1px"></span>สัปดาห์ที่แล้ว</span>';
  h += '</div></div>';

  // 6. Priority bar
  h += '<div style="background:var(--card);border:.5px solid var(--border);border-radius:14px;padding:14px;margin-bottom:8px">';
  h += '<div style="font-size:12px;font-weight:500;color:var(--blk);margin-bottom:10px">สัดส่วน Priority (30 วัน)</div>';
  h += '<div id="pri-bar" style="display:flex;gap:2px;height:6px;border-radius:3px;overflow:hidden;margin-bottom:6px"><div style="flex:1;background:#f0f0f0"></div></div>';
  h += '<div id="pri-legend" style="display:flex;flex-direction:column;gap:6px;margin-top:10px"></div>';
  h += '</div>';

  // 7. Rudy
  h += '<div style="background:var(--card);border:.5px solid var(--border);border-radius:14px;padding:14px;margin-bottom:8px">';
  h += '<div style="font-size:10px;font-weight:600;color:var(--sub);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">Rudy วิเคราะห์</div>';
  h += '<div id="rudy-text" style="font-size:13px;color:var(--sub);line-height:1.7">⏳ กำลังวิเคราะห์...</div>';
  h += '</div>';

  document.getElementById('cnt').innerHTML = h;

  // โหลดข้อมูลทั้งหมด
  var thDays = ['อา','จ','อ','พ','พฤ','ศ','ส'];

  // weekly stats (streak + week total เท่านั้น)
  apiCall({ action:'getWeeklyStats' }, function(data) {
    if (!data) return;
    weeklyStats = data;
    var elWD = document.getElementById('ai-week-done');
    if (elWD) elWD.textContent = data.totalDone || 0;
    var elStr = document.getElementById('ai-streak');
    if (elStr) elStr.textContent = '🔥 ' + (data.streak || 0);
  });

  // trend 30 วัน — ไล่เฉดสีตามปริมาณงาน
  apiCall({ action:'getCompletedTasks', days:30 }, function(cdata2) {
    var tasks30 = (cdata2 && cdata2.tasks) || [];
    var now3 = new Date();
    var byDay = {};
    var dayLabels = [];
    for (var i=29; i>=0; i--) {
      var d3 = new Date(now3); d3.setDate(now3.getDate()-i);
      var ds3 = d3.getFullYear()+'-'+String(d3.getMonth()+1).padStart(2,'0')+'-'+String(d3.getDate()).padStart(2,'0');
      byDay[ds3] = 0;
      dayLabels.push({ ds:ds3, label:thDays[d3.getDay()], date:d3.getDate(), isToday:ds3===TODAY_STR });
    }
    tasks30.forEach(function(t){ if (byDay[t.completedDate]!==undefined) byDay[t.completedDate]++; });

    var vals = dayLabels.map(function(d){ return byDay[d.ds]||0; });
    var maxV = Math.max.apply(null, vals.concat([1]));
    var prev15 = vals.slice(0,15).reduce(function(a,b){return a+b;},0);
    var curr15 = vals.slice(15).reduce(function(a,b){return a+b;},0);
    var diff = curr15 - prev15;

    // trend label
    var elTL = document.getElementById('trend-label');
    if (elTL) elTL.innerHTML = diff > 0
      ? '<span style="color:#3B6D11">↑ +'+diff+' งาน ครึ่งเดือนหลัง vs ต้น</span>'
      : diff < 0
      ? '<span style="color:#A32D2D">↓ '+Math.abs(diff)+' งาน ครึ่งเดือนหลัง vs ต้น</span>'
      : '<span style="color:var(--sub)">เท่ากันทั้งสองช่วง</span>';

    // bars — ไล่เฉดสีตามปริมาณ
    var barsEl = document.getElementById('trend-bars');
    if (barsEl) {
      barsEl.innerHTML = vals.map(function(v,i){
        var h2 = Math.max(2, Math.round(v/maxV*60));
        var ratio = v/maxV;
        var bg;
        if (v === 0) bg = '#f0f0f0';
        else if (ratio < 0.25) bg = '#f5e6e6';
        else if (ratio < 0.5) bg = '#c97575';
        else if (ratio < 0.75) bg = '#a84040';
        else bg = '#8B2A2A';
        var isT = dayLabels[i].isToday;
        var border = isT ? 'outline:2px solid #8B2A2A;outline-offset:1px;' : '';
        return '<div style="flex:1;height:'+h2+'px;background:'+bg+';border-radius:2px;z-index:1;'+border+'" title="'+dayLabels[i].ds+': '+v+' งาน"></div>';
      }).join('');
    }

    // labels — แสดงเฉพาะวันที่ 1, 8, 15, 22, วันนี้
    var labEl = document.getElementById('trend-labels');
    if (labEl) {
      labEl.innerHTML = dayLabels.map(function(d,i){
        var show = d.date===1 || d.date===8 || d.date===15 || d.date===22 || d.isToday;
        if (!show) return '<span></span>';
        return '<span style="color:'+(d.isToday?'var(--red)':'var(--sub)')+';font-weight:'+(d.isToday?'500':'400')+'">'+d.date+'</span>';
      }).join('');
    }

    // SVG line
    var svgEl = document.getElementById('trend-svg');
    if (svgEl) {
      var n = vals.length - 1;
      var pts = vals.map(function(v,i){
        var x = Math.round(i*(300/n));
        var y = Math.round(70 - Math.max(2, v/maxV*60));
        return x+','+y;
      }).join(' ');
      svgEl.innerHTML = '<polyline points="'+pts+'" fill="none" stroke="rgba(139,42,42,.3)" stroke-width="1" stroke-linejoin="round"/>';
    }

    // delta rows — 7 วันล่าสุด
    var deltaEl = document.getElementById('delta-rows');
    if (deltaEl) {
      var last7 = vals.slice(-7);
      var last7Labels = dayLabels.slice(-7);
      var maxV7 = Math.max.apply(null, last7.concat([1]));
      deltaEl.innerHTML = last7.map(function(v,i){
        var prev2 = i > 0 ? last7[i-1] : v;
        var diff2 = v - prev2;
        var isT = last7Labels[i].isToday;
        var pct = maxV7 > 0 ? Math.round(v/maxV7*100) : 0;
        var diffStr = i===0 ? '–' : diff2>0 ? '+'+diff2 : diff2<0 ? ''+diff2 : '0';
        var diffCol = diff2>0 ? '#3B6D11' : diff2<0 ? '#A32D2D' : '#aaa';
        var ratio = v/maxV7;
        var barBg = v===0?'#f0f0f0':ratio<0.25?'#f5e6e6':ratio<0.5?'#c97575':ratio<0.75?'#a84040':'#8B2A2A';
        return '<div style="display:flex;align-items:center;gap:8px">'+
          '<div style="font-size:11px;color:'+(isT?'var(--red)':'var(--sub)')+';font-weight:'+(isT?'500':'400')+';width:32px">'+last7Labels[i].label+' '+last7Labels[i].date+'</div>'+
          '<div style="flex:1;height:5px;background:#f0f0f0;border-radius:3px;overflow:hidden"><div style="width:'+pct+'%;height:100%;background:'+barBg+';border-radius:3px"></div></div>'+
          '<div style="font-size:10px;color:var(--sub);width:20px;text-align:right">'+v+'</div>'+
          '<div style="font-size:10px;color:'+diffCol+';width:24px;text-align:right;font-weight:'+(isT?'500':'400')+'">'+diffStr+'</div>'+
        '</div>';
      }).join('');
    }
    // comparison bands — สัปดาห์นี้ (15 วันหลัง) vs สัปดาห์ก่อน (15 วันแรก)
    var compEl = document.getElementById('comp-rows');
    if (compEl) {
      var thD = ['อา','จ','อ','พ','พฤ','ศ','ส'];
      // จัดกลุ่มตามวันในสัปดาห์
      var thisWk = [0,0,0,0,0,0,0]; // 7 วันล่าสุด
      var prevWk = [0,0,0,0,0,0,0]; // 7-14 วันก่อน
      dayLabels.slice(-14).forEach(function(d,i){
        var dow = new Date(d.ds+'T00:00:00+07:00').getDay();
        if (i < 7) prevWk[dow] += byDay[d.ds]||0;
        else thisWk[dow] += byDay[d.ds]||0;
      });
      var dowOrder = [1,2,3,4,5,6,0]; // จ อ พ พฤ ศ ส อา
      var todayDow = new Date().getDay();
      compEl.innerHTML = dowOrder.map(function(dow){
        var cv = thisWk[dow], pv = prevWk[dow];
        var maxB = Math.max(cv,pv,1);
        var pctC = Math.round(cv/maxB*100), pctP = Math.round(pv/maxB*100);
        var diff3 = cv-pv;
        var diffStr = diff3>0?'+'+diff3:diff3<0?''+diff3:'0';
        var diffCol = diff3>0?'#3B6D11':diff3<0?'#A32D2D':'#aaa';
        var isT = dow===todayDow;
        return '<div style="display:flex;align-items:center;gap:6px">'+
          '<div style="font-size:10px;color:'+(isT?'var(--red)':'var(--sub)')+';font-weight:'+(isT?'500':'400')+';width:24px">'+thD[dow]+'</div>'+
          '<div style="flex:1;display:flex;flex-direction:column;gap:2px">'+
            '<div style="height:4px;background:#f0f0f0;border-radius:2px;overflow:hidden"><div style="width:'+pctC+'%;height:100%;background:var(--red);border-radius:2px"></div></div>'+
            '<div style="height:4px;background:#f0f0f0;border-radius:2px;overflow:hidden"><div style="width:'+pctP+'%;height:100%;background:#ddd;border-radius:2px"></div></div>'+
          '</div>'+
          '<div style="font-size:10px;color:'+diffCol+';width:24px;text-align:right">'+diffStr+'</div>'+
        '</div>';
      }).join('');
    }
  });

  // total done
  apiCall({ action:'getCompletedTasks', days:365 }, function(cdata) {
    var elTD = document.getElementById('ai-total-done');
    if (elTD) elTD.textContent = ((cdata&&cdata.tasks)||[]).length + ' งานเสร็จแล้ว';
  });

  // priority + heatmap (30 วัน)
  apiCall({ action:'getCompletedTasks', days:30 }, function(cdata) {
    var tasks = (cdata && cdata.tasks) || [];
    var now2 = new Date();
    var totalHigh=0, totalMed=0, totalLow=0;
    var byDate = {};
    tasks.forEach(function(t) {
      var d = t.completedDate || '';
      if (!byDate[d]) byDate[d] = 0;
      byDate[d]++;
      if (t.priority==='High') totalHigh++;
      else if (t.priority==='Medium') totalMed++;
      else totalLow++;
    });

    var total30 = totalHigh+totalMed+totalLow;
    if (total30 > 0) {
      var hP = Math.round(totalHigh/total30*100);
      var mP = Math.round(totalMed/total30*100);
      var lP = 100-hP-mP;

      var priBar = document.getElementById('pri-bar');
      if (priBar) priBar.innerHTML =
        '<div style="flex:'+totalHigh+';background:#8B2A2A"></div>'+
        '<div style="flex:'+totalMed+';background:#c97575"></div>'+
        '<div style="flex:'+totalLow+';background:#f0d0d0"></div>';

      var priLeg = document.getElementById('pri-legend');
      if (priLeg) priLeg.innerHTML = [
        {label:'High', color:'#8B2A2A', count:totalHigh, pct:hP},
        {label:'Medium', color:'#c97575', count:totalMed, pct:mP},
        {label:'Low', color:'#f0d0d0', count:totalLow, pct:lP}
      ].map(function(item){
        return '<div style="display:flex;align-items:center;gap:8px">'+
          '<span style="width:8px;height:8px;border-radius:2px;background:'+item.color+';flex-shrink:0;display:inline-block"></span>'+
          '<div style="flex:1;font-size:12px;color:var(--blk)">'+item.label+'</div>'+
          '<div style="font-size:12px;font-weight:500;color:var(--blk)">'+item.count+' งาน</div>'+
          '<div style="font-size:11px;color:var(--sub);width:32px;text-align:right">'+item.pct+'%</div></div>';
      }).join('');
    }

    // heatmap 30 วัน
    var hmEl = document.getElementById('heatmap-grid');
    if (hmEl) {
      var days3 = ['จ','อ','พ','พฤ','ศ','ส','อา'];
      var head = days3.map(function(d){ return '<div style="font-size:8px;color:var(--sub);text-align:center">'+d+'</div>'; }).join('');
      var maxDay = Math.max.apply(null, Object.values(byDate).concat([1]));
      var cells = '';
      for (var i=29; i>=0; i--) {
        var d2 = new Date(now2); d2.setDate(now2.getDate()-i);
        var ds = d2.getFullYear()+'-'+String(d2.getMonth()+1).padStart(2,'0')+'-'+String(d2.getDate()).padStart(2,'0');
        var cnt = byDate[ds] || 0;
        var ratio = cnt/maxDay;
        var bg = ratio===0?'#f0f0f0':ratio<0.25?'#f5e6e6':ratio<0.5?'#c97575':ratio<0.75?'#a84040':'#8B2A2A';
        cells += '<div style="height:14px;border-radius:2px;background:'+bg+'" title="'+ds+': '+cnt+' งาน"></div>';
      }
      hmEl.innerHTML = head + cells;
    }
  });

  // Rudy วิเคราะห์
  apiCall({ action:'getCompletedTasks', days:7 }, function(cdata) {
    var tasks = (cdata && cdata.tasks) || [];
    if (tasks.length === 0) {
      var el = document.getElementById('rudy-text');
      if (el) el.textContent = 'ยังไม่มีงานเสร็จในสัปดาห์นี้เลยค่ะ ไปลุยกันเลยนะคะ 💪';
      return;
    }
    var taskList = tasks.map(function(t,i){ return (i+1)+'. ['+t.priority+'] '+t.name; }).join('\n');
    apiCall({
      action: 'askRudy',
      prompt: encodeURIComponent('วิเคราะห์งานที่คุณเดชทำเสร็จในสัปดาห์นี้ และแนะนำว่าควรเสริมด้านไหนในสัปดาห์หน้า:\n\n'+taskList+'\n\nตอบกระชับ 2-3 ประโยค ภาษาไทย เหมือน Rudy คุยกับคุณเดช ไม่ต้องขึ้นต้นด้วย Rudy:')
    }, function(data) {
      var el = document.getElementById('rudy-text');
      if (el && data && data.reply) el.textContent = data.reply;
      else if (el) el.textContent = 'ไม่สามารถวิเคราะห์ได้ตอนนี้ค่ะ';
    });
  });
}

function renderMonthChart() {}
function renderWeekChart() {}

function renderWeekChart() {}

function insight(icon, text, tag, cls) {
  return '<div class="insight"><div class="ins-ic">'+icon+'</div><div><div class="ins-t">'+text+'</div><span class="ins-tag '+cls+'">'+tag+'</span></div></div>';
}

function confirmRoutine(rid) {
  try { localStorage.setItem('confirmed_routine', rid); } catch(e){}
  showToast('✅ บันทึกแล้ว');
  renderAllContent();
}
function unconfirmRoutine(rid) {
  try { localStorage.removeItem('confirmed_routine'); } catch(e){}
  showToast('✏️ ยกเลิกการบันทึก');
  renderAllContent();
}

// ===================== INIT =====================
function init() {
  buildWeekDays();

  var elTitle = document.getElementById('hdr-title');
  var elSub = document.getElementById('hdr-sub');
  var elHdr = document.getElementById('hdr');
  if (elTitle) elTitle.textContent = '';
  if (elSub) elSub.textContent = '';
  if (elHdr) elHdr.style.display = 'none';

  // โหลด tasks ก่อน พอเสร็จ render เลย
  apiCall({ action:'getTasks', date:TODAY_STR }, function(data) {
    todayTasks = data.tasks || [];
    weekTasks[TODAY_STR] = todayTasks;
    renderAll();
  });

  // โหลด events แยก พอได้ก็ re-render
  apiCall({ action:'getCalendarEvents', date:TODAY_STR }, function(data) {
    todayEvents = data.events || [];
    weekTaskEvents[TODAY_STR] = todayEvents;
    if (currentTab === 'all' && selectedDate === TODAY_STR) renderAllContent();
  });

  // โหลด routine แยก พอได้ก็ re-render
  apiCall({ action:'getRoutineItems' }, function(data) {
    var now2 = nowStr();
    routineItems = (data.items || []).filter(function(r) {
      var n = r.name.toUpperCase();
      return n.indexOf('IMPORTANT WORK') === -1 && n.indexOf('WORK ROUTINE') === -1;
    }).map(function(r) {
      return { id: r.id, name: r.name, start: r.start, end: r.end, done: now2 > r.end };
    });
    if (currentTab === 'all' && selectedDate === TODAY_STR) renderAllContent();
    if (currentTab === 'routine') renderRoutine();
  });

  apiCall({ action:'getNoDateTasks' }, function(data) {
    noDateTasks = data.tasks || [];
  });

  apiCall({ action:'getRoutineStats' }, function(data) {
    routineStats = data || { weekStats:{}, monthStats:{}, streak:0 };
    if (currentTab === 'routine') renderRoutine();
  });
}

setTimeout(function() {
  try {
    if (typeof liff !== 'undefined') {
      liff.init({ liffId: LIFF_ID }).then(init).catch(init);
    } else { init(); }
  } catch(e) { init(); }
}, 300);
</script>
